name: Selenium Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [ main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, edge]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build with Maven
        run: mvn clean compile
      - name: Run Tests on ${{ matrix.browser }}
        run: mvn test -Dbrowser=${{ matrix.browser }}
      - name: Upload Cucumber HTML Reports
        uses: actions/upload-artifact@v4
        with:
          name: CucumberReport-${{ matrix.browser }}
          path: target/cucumber-html-report
